function rc4(key, bytes) {
  const S = Array.from({length:256},(_,i)=>i);
  let j=0;
  for(let i=0;i<256;i++){j=(j+S[i]+key.charCodeAt(i%key.length))&255;[S[i],S[j]]=[S[j],S[i]];}
  let ii=0,jj=0;
  return bytes.map(b=>{ii=(ii+1)&255;jj=(jj+S[ii])&255;[S[ii],S[jj]]=[S[jj],S[ii]];return b^S[(S[ii]+S[jj])&255];});
}

function hexToBytes(hex) {
  const b=[];for(let i=0;i<hex.length;i+=2)b.push(parseInt(hex.substr(i,2),16));return b;
}
